name: Fetch Statcast Data

on:
  schedule:
    - cron: '0 10 * * *'  # 6am ET every day
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Call Statcast fetch endpoint
        run: |
          curl -f -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://salzman-baseball.vercel.app/api/cron/fetch-statcast
